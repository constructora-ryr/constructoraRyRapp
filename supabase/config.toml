project_id = "pnqhzzbeiuriqsqzzxqs"

[auth]
site_url = "https://app.constructoraryrltda.com"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://app.constructoraryrltda.com/**",
  "https://constructora-ry-rapp-*.vercel.app/**"
]
enable_signup = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"

[auth.email.template.invite]
subject = "Te invitaron a RyR Constructora"
content_path = "./supabase/templates/invite.html"

[auth.email.template.recovery]
subject = "Recupera tu contraseña — Constructora RyR"
content_path = "./supabase/templates/recovery.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"
